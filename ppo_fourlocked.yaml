experiment:
  name: ppo_fourlocked
  seed: 42
  total_timesteps: 15000000
  checkpoint_every: 50000
  eval: true
  n_eval_episodes: 20
  eval_freq: 100000

env:
  size: 19
  full_obs: true
  n_envs: 8
  render_mode: rgb_array

reward:
  key_bonus: 0.30
  door_bonus: 0.50
  goal_bonus: 1.00
  step_penalty: 0.001

model:
  policy: CnnPolicy
  features_dim: 512
  pi_layers: [256, 256]
  vf_layers: [256, 256]

ppo:
  learning_rate: 0.00025
  n_steps: 1024
  batch_size: 256
  n_epochs: 4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.05
  vf_coef: 0.5
  max_grad_norm: 0.5

logging:
  tensorboard_subdir: tensorboard
  excel_name: experiments.xlsx